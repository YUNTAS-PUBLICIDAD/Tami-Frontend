name: Deploy Astro Static Site

on:
  push:
    branches: ["main", "pre-main"]
  workflow_dispatch:
  repository_dispatch:
    types: [rebuild-frontend]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean Install
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          npm cache clean --force
          npm install

      - name: Build project
        run: |
          rm -rf dist
          npm run build
        env:
          PUBLIC_API_URL: ${{ github.ref == 'refs/heads/pre-main' && secrets.PUBLIC_API_URL_STAGING || secrets.PUBLIC_API_URL }}
          PUBLIC_WHATSAPP_SOCKET_URL: ${{ secrets.PUBLIC_WHATSAPP_SOCKET_URL }}

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary

      - name: Test SSH Connection
        run: |
          for i in {1..3}; do
            if ssh -p ${{ secrets.SERVER_PORT }} \
                -o ConnectTimeout=30 \
                -o StrictHostKeyChecking=no \
                ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'echo "SSH OK"'; then
              echo "✅ Conexión SSH exitosa en intento $i"
              exit 0
            else
              echo "⚠️ Intento $i/3 falló, esperando 15s..."
              sleep 15
            fi
          done
          echo "❌ No se pudo establecer conexión SSH después de 3 intentos"
          exit 1

      - name: Set Target Path
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/pre-main" ]]; then
            echo "DEST_PATH=~/domains/staging.tamimaquinarias.com/public_html/" >> $GITHUB_ENV
          else
            echo "DEST_PATH=~/domains/tamimaquinarias.com/public_html/" >> $GITHUB_ENV
          fi

      - name: Deploy with Rsync
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            echo "🚀 Desplegando a: ${{ env.DEST_PATH }}"
            rsync -avz --delete \
              --timeout=300 \
              --exclude='.git/' \
              --exclude='back/' \
              --exclude='*.log' \
              --exclude='node_modules/' \
              -e "ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no -o ConnectTimeout=60 -o ServerAliveInterval=30 -o ServerAliveCountMax=3" \
              ./dist/ \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEST_PATH }}

      - name: Verify deployment
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            'ls -la ${{ env.DEST_PATH }} | head -10'

      - name: Notify completion
        run: echo "🚀 Deploy Astro completado con éxito"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deploy falló. Revisa los logs para más detalles."
          echo "Posibles causas: timeout SSH, problemas de red, o límites del hosting."